paths:
  base_data_dir: PLACEHOLDER_DIR
  zip_filename: PLACEHOLDER.zip
  extract_dirname: PLACEHOLDER_DIR

  agg_csv: PLACEHOLDER.csv
  geojson: PLACEHOLDER.geojson
  out_match: PLACEHOLDER_RESULTS_DIR/power_locations_with_coordinates.csv
  out_unmatched: PLACEHOLDER_RESULTS_DIR/unmatched_power_locations.csv

  combined_full_csv: PLACEHOLDER_RESULTS_DIR/combined_ukpn_hh_FULL.csv
  combined_power_only_csv: PLACEHOLDER_RESULTS_DIR/combined_ukpn_hh_FULL_power_only.csv
  combined_reduced_csv: PLACEHOLDER_RESULTS_DIR/combined_ukpn_hh_FULL_reduced.csv
  combined_filled_power_csv: PLACEHOLDER_RESULTS_DIR/combined_ukpn_hh_FULL_power_filled.csv
  combined_aggregated_location_csv: PLACEHOLDER_RESULTS_DIR/combined_ukpn_hh_AGGREGATED_BY_LOCATION.csv
  aggregated_with_coords_csv: PLACEHOLDER_RESULTS_DIR/combined_ukpn_hh_AGGREGATED_BY_LOCATION_with_coords.csv

processing:
  fuzzy_threshold: 0.5

  sample_run: true
  sample_file_limit: 10

  chunk_size_streaming: 50000
  chunk_size_quick_check: 200000
  chunk_size_optimized: 200000
  chunk_size_count_unique: 100000
  chunk_size_rank: 100000
  chunk_size_fill_power: 100000
  chunk_size_aggregate_location: 100000

  power_factor: 0.95

matching:
  geojson_candidate_name_cols:
    - 'tx_id'
    - 'transformer_id'
    - 'asset_id'
    - 'substation'
    - 'substation_name'
    - 'name'
    - 'id'

plots:
  ten_locations:
    max_locations: 10
    window_days: 30
    downsample_step: 3
    n_cols: 2
    figsize_base_width: 16
    figsize_height_per_row: 3
    line_width: 0.8
    grid_alpha: 0.4
    grid_linestyle: '--'

logging:
  level: 'INFO'
