paths:
  # Training data derived from per location MW Power Demand and ERA5 weather data
  dataset_path: PLACEHOLDER.parquet
  results_path: PLACEHOLDER_RESULTS_DIR
  log_file: PLACEHOLDER.log
  finetune_ckpt: PLACEHOLDER.ckpt
  inference_ckpt: PLACEHOLDER.ckpt
  output_path: PLACEHOLDER_PREDICTIONS.parquet

splits:
  strategy: 'by_time'
  timestamp_col: 'timestamp'
  train_start: 'PLACEHOLDER_DATETIME'
  train_end:   'PLACEHOLDER_DATETIME'
  val_start:   'PLACEHOLDER_DATETIME'
  val_end:     'PLACEHOLDER_DATETIME'
  test_start:  'PLACEHOLDER_DATETIME'
  test_end:    'PLACEHOLDER_DATETIME'

train_split: null
val_split: null

location_filter:
  mode: 'all'

columns_to_drop:
  - 'is_outlier_iqr'
  - 'is_spike'
  - 'in_long_zero_run'
  - 'did_clip'
  - 'did_spike_smooth'
  - 'did_zero_interp'
  - 'cleaned_reason'
  - 'transformer_lat'
  - 'transformer_lon'

model:
  static_categoricals: []
  static_reals:
    - 'transformer_lat_norm'
    - 'transformer_lon_norm'
  target: 'active_power_mw_clean'
  time_idx: 'time_idx'
  group_ids: ['location']

  max_encoder_length: 336
  max_prediction_length: 96
  attention_head_size: 4
  hidden_size: 96
  hidden_continuous_size: 40
  lstm_layers: 1
  dropout: 0.0675713855264108

  time_varying_known_reals:
    # Raw NWP
    - 'u10'
    - 'v10'
    - 'tcc'
    - 'blh'
    - 't2m_c'
    - 'd2m_c'
    - 'skt_c'
    - 'msl_hpa'
    - 'sp_hpa'
    - 'slhf_w_m2'
    - 'ssr_w_m2'
    - 'str_w_m2'
    - 'sshf_w_m2'
    - 'ssrd_w_m2'
    - 'ishf_w_m2'
    - 'tp_mm'

    # Calendar and temporal
    - 'hour'
    - 'dayofweek'
    - 'dayofyear'
    - 'month'
    - 'year'
    - 'is_weekend'
    - 'is_holiday'
    - 'hour_sin'
    - 'hour_cos'
    - 'month_sin'
    - 'month_cos'
    - 'dayofweek_sin'
    - 'dayofweek_cos'

    # NWP derived features
    - 'wind_speed'
    - 'wind_dir_sin'
    - 'wind_dir_cos'
    - 'temp_x_hour_sin'
    - 'temp_x_hour_cos'
    - 'irradiance_x_clear_sky'

    # Solar - geometry and temporal
    - 'solar_elevation_angle'
    - 'solar_azimuth_angle'
    - 'solar_zenith_angle'
    - 'solar_intensity_factor'
    - 'is_daylight'
    - 'is_civil_twilight'
    - 'sunrise_sunset_proximity'
    - 'daily_max_solar_elevation'
    - 'solar_noon_proximity'
    - 'seasonal_solar_strength'

  time_varying_unknown_reals:
    
    # NWP lagged features
    - 't2m_c_lag_2h'
    - 't2m_c_lag_6h'
    - 'wind_speed_lag_2h'
    - 'wind_speed_lag_6h'
    - 'ssrd_w_m2_lag_2h'
    - 'ssrd_w_m2_lag_6h'

    # Indices for weather
    - 'daily_avg_tcc'
    - 'weather_index'
    - 'cloud_variability'
    - 'weather_stability'
    - 'enhanced_weather_index'
    - 'weather_index_sin'
    - 'weather_index_cos'
    - 'weather_quality_score'

training:
  batch_size: 64
  max_epochs: 80
  precision: '32-true'
  accelerator: 'gpu'
  learning_rate: 0.000139
  weight_decay: 1.8192e-06
  gradient_clip_val: 0.9735
  reduce_on_plateau_patience: 4
  early_stopping_patience: 6
  enable_progress_bar: true
  head_diversity_lambda: 0.01
  head_diversity_warmup_epochs: 2

logging:
  level: 'INFO'
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  console: true
  file: true
