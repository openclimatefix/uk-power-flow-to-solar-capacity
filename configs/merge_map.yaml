paths:
  power_csv: PLACEHOLDER.csv
  mapping_csv: PLACEHOLDER.csv
  weather_glob: PLACEHOLDER_DIR/*.nc
  output_parquet: PLACEHOLDER.parquet

weather:
  time_coord: 'time'
  lat_candidates:
    - 'latitude'
    - 'lat'
  lon_candidates:
    - 'longitude'
    - 'lon'

mapping:
  required_cols:
    - 'era5_lat'
    - 'era5_lon'
  join_cols:
    - 'era5_lat'
    - 'era5_lon'

power:
  timestamp_col: 'timestamp'
  location_col: 'location'

merge:
  on_power_cols:
    - 'location'
    - 'timestamp'
  how: 'inner'

logging:
  level: 'INFO'
